name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Falta el secreto KEYSTORE_BASE64. Anadelo en Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
          echo "Keystore decodificada en app/release.keystore"

      - name: Imprimir SHA-1 de firma (para registrar en Firebase)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "SHA-1 registrada en Firebase (google-services.json): bacecf34b3021b32c4d777060421166f73ab1871"
          echo "SHA-1 del keystore con el que se FIRMA el APK (debe coincidir con la anterior):"
          keytool -list -v -keystore app/release.keystore -alias "$KEY_ALIAS" -storepass:env KEYSTORE_PASSWORD 2>&1 | grep -iE "Alias name|SHA1|SHA256" || echo "No se pudo leer el keystore"

      - name: Build Release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
