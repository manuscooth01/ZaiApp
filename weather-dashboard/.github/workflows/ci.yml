name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd weather-dashboard
          npm ci

      - name: Run tests
        run: |
          cd weather-dashboard
          npm test

      - name: Build
        run: |
          cd weather-dashboard
          npm run build
